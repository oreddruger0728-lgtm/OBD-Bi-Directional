name: Build Android APK

on:
  push:
    paths:
      - 'artifacts/obd2-scanner/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/obd2-scanner/android/**/*.gradle*', 'artifacts/obd2-scanner/android/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Decode keystore (if secret is set)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p artifacts/obd2-scanner/android/app/keystores
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d \
            > artifacts/obd2-scanner/android/app/keystores/release.keystore

      - name: Make gradlew executable
        run: chmod +x artifacts/obd2-scanner/android/gradlew

      - name: Build release APK (sideload) and AAB (Play Store)
        working-directory: artifacts/obd2-scanner/android
        run: ./gradlew assembleRelease bundleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename outputs with version and date
        run: |
          DATE=$(date +%Y%m%d)
          VERSION=$(grep versionName artifacts/obd2-scanner/android/app/build.gradle | awk -F'"' '{print $2}')
          BASE="artifacts/obd2-scanner/android/app/build/outputs"
          mv "$BASE/apk/release/app-release.apk" \
             "$BASE/apk/release/OBD2Pro-v${VERSION}-${DATE}.apk" 2>/dev/null || true
          mv "$BASE/bundle/release/app-release.aab" \
             "$BASE/bundle/release/OBD2Pro-v${VERSION}-${DATE}.aab" 2>/dev/null || true

      - name: Warn if AAB is debug-signed (no Play Store secrets set)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: |
          echo "::warning::No KEYSTORE_BASE64 secret found. The APK is debug-signed (sideload only)."
          echo "::warning::Add the 4 KEYSTORE_* secrets to produce a Play Store-ready signed AAB."

      - name: Upload APK artifact (sideload)
        uses: actions/upload-artifact@v4
        with:
          name: OBD2-Pro-APK
          path: artifacts/obd2-scanner/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB artifact (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: OBD2-Pro-AAB
          path: artifacts/obd2-scanner/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Create release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/obd2-scanner/android/app/build/outputs/apk/release/*.apk
            artifacts/obd2-scanner/android/app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
